name: Sync develop → production (staging deploy)

on:
  push:
    branches:
      - develop

jobs:
  sync:
    name: Fast-forward production to develop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push develop → production
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git push origin origin/develop:refs/heads/production --force
